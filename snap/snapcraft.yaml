name: moviestar
version: 0.1.0
summary: Privacy preserving movie rating and recommendations.
description: |
  MovieStar is a movie and tv show recommender. You can provide your
  own ratings and comments, and share them with others. All notes and
  recommendations are stored in your Data Vault (also called personal
  online data store or Pod) on a Solid Server.

base: core22
grade: stable
confinement: strict

apps:
  moviestar:
    command: moviestar
    extensions: [gnome]
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - network
      - home

parts:
  moviestar:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart
    build-packages:
      - clang
      - cmake
      - ninja-build
      - libgtk-3-dev
      - libblkid-dev
      - liblzma-dev
