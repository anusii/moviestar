name: moviestar
description: "A modern privacy-first movie discovery and tracking application."
publish_to: "none"
version: 0.0.18+7

environment:
  sdk: ">=3.2.3 <4.0.0"

# To automatically upgrade package dependencies:
#
# `flutter pub upgrade --major-versions`.
#
# To see which dependencies have newer versions available:
#
# `flutter pub outdated`.
#
# (gjw 20250429)

dependencies:
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.2 # An asset repository.
  file_picker: ^10.1.9
  # Database dependencies for local caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0-beta.4
  gap: ^3.0.1
  http: ^1.1.0
  intl: any
  markdown_tooltip: ^0.0.8

  path: ^1.9.1
  pdf: ^3.11.3
  printing: ^5.14.2
  rdflib: ^0.2.12
  rxdart: ^0.28.0
  shared_preferences: ^2.2.2
  solidpod: ^0.7.8
  solidui:
    git:
      url: https://github.com/anusii/solidui.git
      ref: dev
  universal_io: ^2.2.2
  url_launcher: ^6.3.1
  window_manager: ^0.5.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.2
  flutter_lints: ^5.0.0
  # Database code generation dependencies
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  import_order_lint: ^0.2.2
  test: ^1.25.15
  ubuntu_lints: ^0.4.0

dependency_overrides:
  rxdart: ^0.28.0

flutter:
  assets:
    - assets/images/
  uses-material-design: true

# Define launcher icons for all platforms (except Linux) so icons for
# the apps can be automatically updated using:
#
# `dart run flutter_launcher_icons`
#
# (gjw 20250429)

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: true
  min_sdk_android: 21
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  macos:
    generate: true
  web:
    generate: true
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    icon_size: 48 # min:48, max:256, default: 48
