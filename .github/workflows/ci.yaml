name: Lint Checks

# Always run the checks on a push to dev and a PR.

on:
  push:
    branches:
      - dev
  pull_request:
    types: [opened, reopened, synchronize]

env:
  FLUTTER_VERSION: '3.35.3'

jobs:

  lint_checks:
    runs-on: ubuntu-latest
    if: github.event.repository.private == false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{env.FLUTTER_VERSION}}
      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Format
        run: dart format --set-exit-if-changed .

      - name: Dart code metrics
        continue-on-error: true
        run: |
          dart pub global activate dart_code_metrics
          metrics check-unnecessary-nullable --disable-sunset-warning lib
          metrics check-unused-code --disable-sunset-warning lib
          metrics check-unused-files --disable-sunset-warning lib
          metrics analyze --disable-sunset-warning lib --reporter=console

      - name: Import order lint
        run: |
          dart pub global activate import_order_lint
          import_order --check

      - name: Markdown
        run: |
          npm install -g markdownlint-cli
          markdownlint --disable MD036 -- *.md lib assets installers

      - name: Lines of code
        run: make locmax-enforce

      - name: Copyright headers
        run: |
          # Find Dart files without proper copyright headers, excluding generated files
          missing_copyright=$(find lib -type f -name '*.dart' \
            ! -name '*.g.dart' \
            ! -name '*.gr.dart' \
            ! -name '*.freezed.dart' \
            ! -name '*.chopper.dart' \
            ! -name '*.part.dart' \
            ! -name '*.config.dart' \
            -exec grep -L "Copyright" {} \;)
          if [ -n "$missing_copyright" ]; then
            echo "❌ Files missing copyright headers:"
            echo "$missing_copyright"
            echo ""
            echo "💡 Note: Generated files (*.g.dart, *.freezed.dart, etc.) are automatically excluded"
            exit 1
          else
            echo "✅ All non-generated Dart files have copyright headers"
          fi
